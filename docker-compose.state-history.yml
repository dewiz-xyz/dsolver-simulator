services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: state_history
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - target: 5432
        published: "${STATE_HISTORY_POSTGRES_PORT:-55432}"
        host_ip: "${STATE_HISTORY_POSTGRES_BIND:-127.0.0.1}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d state_history"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: state-history
      MINIO_ROOT_PASSWORD: state-history-secret
    ports:
      - target: 9000
        published: "${STATE_HISTORY_MINIO_PORT:-59000}"
        host_ip: "${STATE_HISTORY_MINIO_BIND:-127.0.0.1}"
      - target: 9001
        published: "${STATE_HISTORY_MINIO_CONSOLE_PORT:-59001}"
        host_ip: "${STATE_HISTORY_MINIO_BIND:-127.0.0.1}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 2s
      timeout: 2s
      retries: 30
